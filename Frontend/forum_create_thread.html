<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Neuen Thread erstellen — u.hu</title>
    <link rel="icon" type="image/x-icon" href="./logos/u_hu_logo_clean_transparent.png"/>
    <link rel="stylesheet" href="styles/styles.css"/>

</head>
<body>
<div class="frame">
    <header class="topbar">
        <div class="logo">
            <picture>
                    <img src="./logos/u_hu_logo_clean_transparent.png" alt="Logo"/>
            </picture>
        </div>
        <a class="nav-link" href="index.html">Startseite</a>
        <div class="search-wrap">
            <input type="text" class="search-bar" placeholder="Vögel suchen..."/>
            <button class="search-button" onclick="window.location.href='browse_search.html'">Suchen</button>
        </div>
        <a class="nav-link" href="browse.html">Entdecken</a>
        <a class="nav-link" href="forum_feed.html">Forum</a>
    </header>

    <section class="forum-section" id="forum">
        <form class="post-form" id="post-form" action="#" method="post">
            <div class="forum-feed-header">
                <h1>Neuen Thread erstellen</h1>
                <p>Der erste Post eröffnet den Thread. Alle weiteren Antworten werden als normale Posts im Thread ergänzt.</p>
            </div>

            <div class="form-group">
                <label for="name">Name:</label>
                <input id="name" type="text" name="Name" placeholder="Name" class="input">
            </div>

            <div class="form-group">
                <label for="header">Thread-Titel:</label>
                <input id="header" type="text" name="Header" placeholder="Thread-Titel" class="input">
            </div>

            <div class="form-group textarea-group">
                <label for="post">Beitrag:</label>
                <textarea id="post" name="Post" placeholder="Erster Beitrag im Thread" class="input input_2" rows="5"></textarea>
            </div>
        </form>

        <div class="form-actions">
            <button class="submit-button" type="submit" form="post-form">
                Thread erstellen
            </button>
        </div>
    </section>

    <footer class="footer">
        <nav class="footer-links">
            <a href="impressum.html">Impressum</a>
            <a href="agb.html">AGBs</a>
        </nav>
    </footer>
</div>
</body>

</html>

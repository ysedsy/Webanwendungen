<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Beitrag in Thread verfassen — u.hu</title>
    <link rel="icon" type="image/x-icon" href="./logos/u_hu_logo_clean_transparent.png"/>
    <link rel="stylesheet" href="styles/styles.css"/>

</head>
<body>
<div class="frame">
    <header class="topbar">
        <div class="logo">
            <picture>
                    <img src="./logos/u_hu_logo_clean_transparent.png" alt="Logo"/>
            </picture>
        </div>
        <a class="nav-link" href="index.html">Startseite</a>
        <div class="search-wrap">
            <div class="search-input-wrap">
                <input type="text" class="search-bar" placeholder="Vögel suchen..."/>
                <button class="search-clear" type="button" aria-label="Suchfeld leeren">✕</button>
            </div>
            <button class="search-button" onclick="window.location.href='browse_search.html'">Suchen</button>
        </div>
        <a class="nav-link" href="browse.html">Entdecken</a>
        <a class="nav-link" href="forum_feed.html">Forum</a>
    </header>

    <section class="forum-section" id="forum">
        <form class="post-form" id="post-form" action="#" method="post">
            <div class="forum-feed-header">
                <h1>Beitrag in Thread verfassen</h1>
            </div>

            <div class="thread-card" aria-label="Aktueller Thread">
                <header class="thread-card-header">
                    <span class="thread-meta">Antwort auf bestehenden Thread</span>
                </header>
                <h2 class="thread-title"><a href="feed_topic_allgemeine_diskussion.html">Frühlingsbeobachtungen im Stadtpark</a></h2>
            </div>

            <div class="form-group">
                <label for="name">Name:</label>
                <input id="name" type="text" name="Name" placeholder="Name" class="input">
            </div>

            <div class="form-group textarea-group">
                <label for="post">Beitrag:</label>
                <textarea id="post" name="Post" placeholder="Dein Beitrag" class="input input_2" rows="5"></textarea>
            </div>
        </form>

        <div class="form-actions">
            <button class="submit-button" type="submit" form="post-form">
                Antwort veröffentlichen
            </button>
        </div>
    </section>

    <footer class="footer">
        <nav class="footer-links">
            <a href="impressum.html">Impressum</a>
            <a href="agb.html">AGBs</a>
        </nav>
    </footer>
</div>

</html>

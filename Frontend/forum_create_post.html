<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Beitrag in Thread verfassen — u.hu</title>
    <link rel="icon" type="image/x-icon" href="./logos/u_hu_logo_clean_transparent.png"/>
    <link rel="stylesheet" href="styles/styles.css"/>

</head>
<body>
<div class="frame">
    <div data-include="partials/header.html"></div>

    <section class="forum-section" id="forum">
        <form class="post-form" id="post-form" action="#" method="post">
            <div class="forum-feed-header">
                <h1>Post in Thread verfassen</h1>
            </div>

            <div class="thread-card" aria-label="Aktueller Thread">
                <header class="thread-card-header">
                    <span class="thread-meta">Antwort auf bestehenden Thread</span>
                </header>
                <h2 class="thread-title">Antwort verfassen</h2>
            </div>

            <div class="form-group">
                <label for="name">Name:</label>
                <input id="name" type="text" name="Name" placeholder="Name" class="input">
            </div>

            <div class="form-group textarea-group">
                <label for="post">Beitrag:</label>
                <textarea id="post" name="Post" placeholder="Dein Beitrag" class="input input_2" rows="5"></textarea>
            </div>
        </form>

        <div class="form-actions">
            <button class="submit-button" type="submit" form="post-form">
                Antwort veröffentlichen
            </button>
        </div>
    </section>

    <div data-include="partials/footer.html"></div>
</div>
    <script src="scripts/headerInit.js" defer></script>
    <script src="scripts/layout-includes.js" defer></script>
    <script src="scripts/createPost.js" defer></script>
</body>

</html>

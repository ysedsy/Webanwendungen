<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Bird Encyclopedia u.hu</title>
        <link rel="icon" type="image/x-icon" href="..\Logos\u_hu_logo_clean_transparent.png"/>
        <link rel="stylesheet" href="styles\styles.css"/>
        <style>
            :root {
                --secondary_light: rgba(43, 94, 93, 0.75);
            }

            .forum-page {
                width: 100%;
                display: grid;
                justify-items: center;
                gap: 1rem;
                padding: 3rem 1rem 2rem;
            }

            .forum-actions {
                width: 100%;
                max-width: 48rem;
                display: flex;
                justify-content: flex-end;
                padding-right: 2rem;
            }

            .submit-button {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                min-width: 9rem;
                height: 2.5rem;
                padding: 0 1.25rem;
                border: 2px solid var(--primary);
                border-radius: 999px;
                background: transparent;
                color: var(--primary);
                font-size: 1rem;
                font-weight: 600;
                text-decoration: none;
                cursor: pointer;
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
                transition:
                        background 0.2s ease,
                        color 0.2s ease,
                        transform 0.15s ease;
            }

            .submit-button:hover {
                background: color-mix(in srgb, var(--primary) 90%, white);
                color: white;
            }

            .submit-button:active {
                transform: scale(0.98);
            }

            .feed-window {
                width: 100%;
                max-width: 46rem;
                height: calc(100vh - 18rem);
                max-height: 40rem;
                min-height: 24rem;
                overflow-y: auto;
                padding: 1rem;
                border-radius: 1rem;
                background: var(--surface);
                box-shadow:
                        inset 0 1px 3px rgba(0, 0, 0, 0.06),
                        0 4px 10px rgba(0, 0, 0, 0.08);
            }

            .forum-feed {
                display: grid;
                gap: 2rem;
            }

            .post-card {
                display: grid;
                gap: 0.75rem;
            }

            .post-header,
            .post-body {
                border: 0.1rem solid var(--secondary);
                border-radius: 0.5rem;
                background: var(--surface);
                box-shadow: 0 3px 8px rgba(0, 0, 0, 0.1);
            }

            .post-header {
                display: flex;
                gap: 0.75rem;
                padding: 0.75rem 1rem;
                font-weight: 600;
            }

            .post-body {
                min-height: 14rem;
                padding: 1rem;
                line-height: 1.5;
            }
        </style>

    </head>
<body>
<div class="frame">
    <header class="topbar">
        <div class="logo">
            <picture>
                <img src="..\Logos\u_hu_logo_clean_transparent.png" alt="Logo"/>
            </picture>
        </div>
        <a class="nav-link" href="#home">Home</a>
        <div class="search-wrap">
            <input type="text" class="search-bar" placeholder="Search birds..."/>
        </div>
        <a class="nav-link" href="#browse">Browse</a>
        <a class="nav-link" href="#forum">Forum</a>
    </header>


    <main class="forum-page">
        <div class="forum-actions">
            <a class="submit-button" href="#create-post">
                Create Post
            </a>
        </div>

        <section class="feed-window" aria-label="Forum posts">
            <div class="forum-feed">
            <article class="post-card">
                <header class="post-header">
                    <span>Name</span>
                    <span>Date</span>
                    <span>Header</span>
                </header>

                <div class="post-body">
                    Beispieltext, der den Inhalt eines Forumbeitrags darstellt.
                </div>
            </article>

            <article class="post-card">
                <header class="post-header">
                    <span>Name</span>
                    <span>Date</span>
                    <span>Header</span>
                </header>

                <div class="post-body">
                    Beispieltext, der den Inhalt eines Forumbeitrags darstellt.
                </div>
            </article>
            </div>
        </section>
    </main>


    <footer class="footer">
        <nav class="footer-links">
            <a href="#kontakt">Kontakt</a>
            <a href="#privacy">Datenschutzerklärung</a>
        </nav>
    </footer>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Bird Encyclopedia u.hu</title>
    <link rel="icon" type="image/x-icon" href="..\Logos\u_hu_logo_clean_transparent.png"/>
    <link rel="stylesheet" href="styles\styles.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="frame">
    <header class="topbar">
        <div class="logo">
            <picture>
                <img src="..\Logos\u_hu_logo_clean_transparent.png" alt="Logo"/>
            </picture>
        </div>
        <a class="nav-link" href="#home">Home</a>
        <div class="search-wrap">
            <input type="text" class="search-bar" placeholder="Search birds..."/>
        </div>
        <a class="nav-link" href="#browse">Browse</a>
        <a class="nav-link" href="#forum">Forum</a>
    </header>

    <div class="container d-flex flex-column align-items-center mt-5">
        <div class="card shadow p-4" style="width: 100%; max-width: 700px;">
            <table class="table-borderless w-100" style="border-spacing: 8px 12px; border-collapse: separate;">
                <tr>
                    <td style="white-space: nowrap;">
                        Name:
                    </td>
                    <td>
                        <input
                                type="text"
                                name="Name"
                                placeholder="Name..."
                                class="form-control">
                    </td>
                </tr>
                <tr>
                    <td style="white-space: nowrap;">
                        Header:
                    </td>
                    <td>
                        <input
                                type="text"
                                name="Header"
                                placeholder="Header..."
                                class="form-control">
                    </td>
                </tr>
                <tr>
                    <td></td>
                    <td>
                        <textarea
                                name="Post"
                                placeholder="Create Post..."
                                class="form-control"
                                rows="5"
                                style="resize: none;"></textarea>
                    </td>
                </tr>
                <tr>
                    <td></td>
                    <td style="text-align: right;">
                        <a class="hero-button" href="#browse">Publish Post</a>
                    </td>
                </tr>
            </table>

            </div>
        </div>

        <footer class="footer">
            <nav class="footer-links">
                <a href="#kontakt">Kontakt</a>
                <a href="#privacy">Datenschutzerklärung</a>
            </nav>
        </footer>
    </div>
</body>
</html>

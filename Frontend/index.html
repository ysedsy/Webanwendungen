<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bird Encyclopedia u.hu</title>
    <link rel="icon" type="image/x-icon" href="..\Logos\u_hu_logo_clean_transparent.png" />
    <link rel="stylesheet" href="styles\styles.css" />
</head>

<body>
    <div class="frame">
        <header class="topbar">
            <div class="logo">
                <picture>
                    <img src="..\Logos\u_hu_logo_clean_transparent.png" alt="Logo" />
                </picture>
            </div>
            <a class="nav-link" href="#home">Home</a>
            <div class="search-wrap">
                <input type="text" class="search-bar" placeholder="Search birds..." />
            </div>
            <a class="nav-link" href="#browse">Browse</a>
            <a class="nav-link" href="#forum">Forum</a>
        </header>

        <main class="hero" id="home">
            <div class="hero-background">
                <picture>
                    <img src="..\Images\landing_background3.jpg" />
                </picture>
                <section class="hero-card" aria-label="Landing page preview">
                    <h1 class="hero-title"><span style="color: var(--secondary);"> Bird Encyclopedia u<span
                                style="color: var(--primary);">.</span><span
                                style="color: var(--accent );">hu</span></span></h1>
                    <a class="hero-button" href="#browse">Browse birds</a>
                </section>
            </div>
        </main>

        <footer class="footer">
            <nav class="footer-links">
                <a href="#kontakt">Kontakt</a>
                <a href="#privacy">Datenschutzerklärung</a>
            </nav>
        </footer>
    </div>
</body>

</html>
